{% extends "website/base.html" %}
{% block title %}Login - Wing Kong Property{% endblock %}

{% block content %}
<div
    style="max-width: 450px; margin: 60px auto; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">Tenant Login</h2>

    {% if messages %}
    <div style="margin-bottom: 20px;">
        {% for message in messages %}
        <div style="padding: 12px 16px; border-radius: 6px; margin-bottom: 8px;
            {% if message.tags == 'error' %}background: #fee; color: #c33; border-left: 4px solid #c33;
            {% else %}background: #efe; color: #363; border-left: 4px solid #363;{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: 600; margin-bottom: 6px; color: #555;">Email Address</label>
            <input type="email" name="email" required autofocus
                style="width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; font-weight: 600; margin-bottom: 6px; color: #555;">Password</label>
            <input type="password" name="password" required
                style="width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box;">
        </div>

        <button type="submit"
            style="width: 100%; padding: 14px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">
            Login
        </button>
    </form>

    <p style="text-align: center; margin-top: 24px; color: #888;">
        Don't have an account? <a href="{% url 'website:tenant_register' %}"
            style="color: #2c3e50; font-weight: 600;">Register here</a>
    </p>
</div>
{% endblock %}
