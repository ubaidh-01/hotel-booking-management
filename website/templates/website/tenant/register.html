{% extends "website/base.html" %}
{% block title %}Register - Wing Kong Property{% endblock %}

{% block content %}
<div
    style="max-width: 600px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 30px;">Create Tenant Account</h2>

    {% if messages %}
    <div style="margin-bottom: 20px;">
        {% for message in messages %}
        <div style="padding: 12px 16px; border-radius: 6px; margin-bottom: 8px;
            {% if message.tags == 'error' %}background: #fee; color: #c33; border-left: 4px solid #c33;
            {% else %}background: #efe; color: #363; border-left: 4px solid #363;{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" id="registerForm">
        {% csrf_token %}

        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">Full Name *</label>
            <input type="text" name="full_name" required value="{{ form_data.full_name|default:'' }}"
                style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">Email Address *</label>
            <input type="email" name="email" required value="{{ form_data.email|default:'' }}"
                style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">Phone Number *</label>
                <input type="tel" name="phone" required value="{{ form_data.phone|default:'' }}"
                    style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">WhatsApp
                    Number</label>
                <input type="tel" name="whatsapp_number" value="{{ form_data.whatsapp_number|default:'' }}"
                    style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">Nationality *</label>
                <input type="text" name="nationality" required value="{{ form_data.nationality|default:'' }}"
                    style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">Date of Birth
                    *</label>
                <input type="date" name="date_of_birth" required value="{{ form_data.date_of_birth|default:'' }}"
                    style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
            </div>
        </div>

        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">Gender *</label>
            <select name="gender" required
                style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
                <option value="">Select Gender</option>
                <option value="male" {% if form_data.gender=='male' %}selected{% endif %}>Male</option>
                <option value="female" {% if form_data.gender=='female' %}selected{% endif %}>Female</option>
                <option value="other" {% if form_data.gender=='other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">Password *</label>
                <input type="password" name="password" required minlength="8"
                    style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 4px; color: #555;">Confirm Password
                    *</label>
                <input type="password" name="password_confirm" required minlength="8"
                    style="width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
            </div>
        </div>

        <button type="submit"
            style="width: 100%; padding: 14px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;">
            Create Account
        </button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #888;">
        Already have an account? <a href="{% url 'website:tenant_login' %}"
            style="color: #2c3e50; font-weight: 600;">Login here</a>
    </p>
</div>
{% endblock %}
